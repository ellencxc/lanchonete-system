<!DOCTYPE html>
<html>
<head>
    <title>Cadastro de Produto - Lanchonete</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0px 0px 5px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            background: #ff5733;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e74c3c;
        }

        #listaProdutos {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 220px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 10px 0 5px 0;
        }

        .preco {
            color: green;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-excluir {
            margin-top: 10px;
            background: #c0392b;
        }

        .btn-excluir:hover {
            background: #a93226;
        }

        #mensagem {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <h2>Cadastrar Produto</h2>

    <form id="formProduto">
        <input type="text" id="nome" placeholder="Nome do produto" required>
        <br><br>

        <input type="text" id="descricao" placeholder="Descrição" required>
        <br><br>

        <input type="number" id="preco" placeholder="Preço" required>
        <br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <p id="mensagem"></p>

    <h2>Produtos cadastrados</h2>

    <div id="listaProdutos"></div>

    <script>
        document.getElementById("formProduto").addEventListener("submit", function(e) {
            e.preventDefault();

            let produto = {
                nome: document.getElementById("nome").value,
                descricao: document.getElementById("descricao").value,
                preco: document.getElementById("preco").value
            };

            fetch("http://localhost:5000/produtos", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(produto)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("mensagem").innerText = data.mensagem;

                document.getElementById("formProduto").reset();

                carregarProdutos();
            });
        });

        function carregarProdutos() {
            fetch("http://localhost:5000/produtos")
            .then(res => res.json())
            .then(produtos => {
                let lista = document.getElementById("listaProdutos");

                lista.innerHTML = "";

                produtos.forEach(produto => {
                    let item = document.createElement("div");

                    item.innerHTML = `
                        <div class="card">
                            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" width="80" alt="Hambúrguer">

                            <h3>${produto.nome}</h3>

                            <p>${produto.descricao}</p>

                            <p class="preco">R$ ${produto.preco}</p>

                            <button class="btn-excluir" onclick="deletarProduto(${produto.id})">Excluir</button>
                        </div>
                    `;

                    lista.appendChild(item);
                });
            });
        }

        function deletarProduto(id) {
            fetch("http://localhost:5000/produtos/" + id, {
                method: "DELETE"
            })
            .then(res => res.json())
            .then(data => {
                alert(data.mensagem);
                carregarProdutos();
            });
        }

        carregarProdutos();
    </script>

</body>
</html>
